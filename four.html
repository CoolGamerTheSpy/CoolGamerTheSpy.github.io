    <script type="text/javascript">
      /***********************************************
      * Disable "Enter" key in Form script- By Nurul Fadilah(nurul@REMOVETHISvolmedia.com)
      * This notice must stay intact for use
      * Visit http://www.dynamicdrive.com/ for full source code
      ***********************************************/               
      function handleEnter (field, event) {
        var keyCode = event.keyCode ? event.keyCode : event.which ? event.which : event.charCode;
        if (keyCode == 13) {
          var i;
          for (i = 0; i < field.form.elements.length; i++)
            if (field == field.form.elements[i])
              break;
          i = (i + 1) % field.form.elements.length;
          field.form.elements[i].focus();
          return false;
        } 
        else
          return true;
      }     
    </script>
		<title>Question 4</title>
	</head>
  <body>
    <script>
      var attempt = 3; // Variable to count number of attempts.
      // Below function Executes on click of login button.
      function validate(){
        var username = document.getElementById("username").value;
        if ( username == "fve"){
          alert ("Correct");
         window.location = "five.html"; // Redirecting to other page.
         return false;
        }
        else{
          attempt --;// Decrementing by one.
          alert("You have "+attempt+" attempt(s) left!");
          // Disabling fields after 3 attempts.
          if( attempt == 0){
            document.getElementById("username").disabled = true;
            document.getElementById("submit").disabled = true;
            return false;
          }
        }
      }
    </script>
    <div class="Question">
      <h1>Question 4</h1>
      <p>What word did I misspell in the slide show?</p>
			<br>
      <form id="form_id" method="post" name="myform">
        <input type="text" name="Answer" id="username" onkeypress="return handleEnter(this, event)"/>
        <br>
        <br>
        <input type="button" value="Submit" id="submit" onclick="validate()"/>
        </form>
  </body>
